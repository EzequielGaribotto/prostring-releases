name: VirusTotal Scan

on:
  release:
    types: [published]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./to-scan
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Downloading assets from release: $RELEASE_TAG"

          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-win.exe" || echo "Windows exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-macos" || echo "macOS exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-linux" || echo "Linux exe not found"

          ls -lh ./to-scan/ || echo "No files downloaded"

      - name: Calculate file hashes for VirusTotal
        run: |
          cd ./to-scan
          echo "## File Hashes for VirusTotal Verification"
          echo ""
          for file in *; do
            if [ -f "$file" ]; then
              echo "**$file:**"
              sha256sum "$file" | awk '{print "SHA256: " $1}'
              echo ""
            fi
          done > ../vt-hashes.txt
          cat ../vt-hashes.txt

      - name: Update release with hash verification note
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseBody = context.payload.release.body || '';
            const hashNote = "\n\n---\n\n## 🔒 Security & Verification\n\nInstallers are built from open-source code and can be independently verified:\n\n- **Source:** https://github.com/EzequielGaribotto/prostring-releases\n- **Build:** Node.js binaries bundled with `pkg`\n- **Verification:** Users can calculate file hashes and compare with hashes in the release workflow logs\n\nFor additional security verification, users can upload the files to [VirusTotal](https://www.virustotal.com) using the file hashes below.";

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: releaseBody + hashNote
            });
