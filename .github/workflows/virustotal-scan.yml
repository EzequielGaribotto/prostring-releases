name: VirusTotal Scan

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./to-scan
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Downloading assets from release: $RELEASE_TAG"

          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-win.exe" || echo "Windows exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-macos" || echo "macOS exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-linux" || echo "Linux exe not found"

          ls -lh ./to-scan/ || echo "No files downloaded"

      - name: Calculate file hashes for VirusTotal
        run: |
          cd ./to-scan
          echo "## File Hashes for VirusTotal Verification"
          echo ""
          for file in *; do
            if [ -f "$file" ]; then
              echo "**$file:**"
              sha256sum "$file" | awk '{print "SHA256: " $1}'
              echo ""
            fi
          done > ../vt-hashes.txt
          cat ../vt-hashes.txt

      - name: Verification complete
        if: success()
        run: |
          echo "✅ Release verification complete"
          echo ""
          echo "File hashes have been calculated and are available in the workflow logs."
          echo "Users can independently verify files by comparing hashes."
          echo ""
          echo "For additional security, users can upload files to VirusTotal.com"
