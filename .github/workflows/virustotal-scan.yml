name: VirusTotal Scan

on:
  release:
    types: [published]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./to-scan
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Downloading assets from release: $RELEASE_TAG"

          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-win.exe" || echo "Windows exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-macos" || echo "macOS exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-linux" || echo "Linux exe not found"

          ls -lh ./to-scan/ || echo "No files downloaded"

      - name: Upload to VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if [ -z "$VIRUSTOTAL_API_KEY" ]; then
            echo "⚠️  VirusTotal API key not configured. Skipping scan."
            echo "To enable VirusTotal scanning, add VIRUSTOTAL_API_KEY secret to your repository."
            exit 0
          fi

          cd ./to-scan

          upload_to_vt() {
            local file=$1
            if [ ! -f "$file" ]; then
              echo "File not found: $file"
              return 1
            fi

            echo "Uploading $file to VirusTotal..."

            response=$(curl -s -X POST "https://www.virustotal.com/api/v3/files" \
              -H "x-apikey: $VIRUSTOTAL_API_KEY" \
              -F "file=@$file")

            analysis_id=$(echo "$response" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ -z "$analysis_id" ]; then
              echo "Failed to upload $file"
              echo "Response: $response"
              return 1
            fi

            echo "Uploaded: $file"
            echo "Analysis ID: $analysis_id"
            echo "View results: https://www.virustotal.com/gui/file/$analysis_id"
          }

          for file in *; do
            if [ -f "$file" ]; then
              upload_to_vt "$file"
            fi
          done

      - name: Comment on release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const comment = "## Security Scan\n\nAll installers have been uploaded to VirusTotal for comprehensive malware scanning. Users can verify installer safety at https://www.virustotal.com by searching for the executable file names.\n\n**Installer Files:**\n- install-qz-tray-win.exe\n- install-qz-tray-macos\n- install-qz-tray-linux\n\nEach file is scanned by 70+ antivirus engines. Scan results are public and can be independently verified.";

            await github.rest.repos.createReleaseComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: comment
            });
