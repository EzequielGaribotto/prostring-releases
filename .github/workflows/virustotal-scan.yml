name: VirusTotal Scan

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./to-scan
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Downloading assets from release: $RELEASE_TAG"

          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-win.exe" || echo "Windows exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-macos" || echo "macOS exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-linux" || echo "Linux exe not found"

          ls -lh ./to-scan/ || echo "No files downloaded"

      - name: Scan with VirusTotal
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: |
            ./to-scan/install-qz-tray-win.exe
            ./to-scan/install-qz-tray-macos
            ./to-scan/install-qz-tray-linux

      - name: Upload scan results
        uses: softprops/action-gh-release@v1
        if: always()
        with:
          files: |
            ./results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
