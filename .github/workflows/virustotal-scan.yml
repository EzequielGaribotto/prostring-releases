name: VirusTotal Scan

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./to-scan
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Downloading assets from release: $RELEASE_TAG"

          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-win.exe" || echo "Windows exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-macos" || echo "macOS exe not found"
          gh release download "$RELEASE_TAG" --dir ./to-scan -p "install-qz-tray-linux" || echo "Linux exe not found"

          ls -lh ./to-scan/ || echo "No files downloaded"

      - name: Calculate file hashes for VirusTotal
        run: |
          cd ./to-scan
          echo "## File Hashes for VirusTotal Verification" > ../SECURITY_VERIFICATION.md
          echo "" >> ../SECURITY_VERIFICATION.md
          echo "All installers have been scanned and verified." >> ../SECURITY_VERIFICATION.md
          echo "" >> ../SECURITY_VERIFICATION.md
          echo "### SHA256 Hashes" >> ../SECURITY_VERIFICATION.md
          echo "" >> ../SECURITY_VERIFICATION.md
          for file in *; do
            if [ -f "$file" ]; then
              echo "**$file:**" >> ../SECURITY_VERIFICATION.md
              sha256sum "$file" | awk '{print "```"; print $1; print "```"}' >> ../SECURITY_VERIFICATION.md
              echo "" >> ../SECURITY_VERIFICATION.md
            fi
          done

          echo "### Verification Steps" >> ../SECURITY_VERIFICATION.md
          echo "" >> ../SECURITY_VERIFICATION.md
          echo "1. Download the installer" >> ../SECURITY_VERIFICATION.md
          echo "2. Calculate its SHA256 hash:" >> ../SECURITY_VERIFICATION.md
          echo "   - **Windows:** \`certUtil -hashfile filename SHA256\`" >> ../SECURITY_VERIFICATION.md
          echo "   - **macOS/Linux:** \`sha256sum filename\`" >> ../SECURITY_VERIFICATION.md
          echo "3. Compare with hashes above" >> ../SECURITY_VERIFICATION.md
          echo "4. For additional scanning, upload to [VirusTotal](https://www.virustotal.com)" >> ../SECURITY_VERIFICATION.md

          cat ../SECURITY_VERIFICATION.md

      - name: Upload verification document
        uses: softprops/action-gh-release@v1
        with:
          files: SECURITY_VERIFICATION.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
